front:
  text: 略述金剛頂瑜伽分別聖位修證法門序夫真言陀羅尼宗者是一切如來祕奧之教自覺聖智頓證法門亦是菩薩具受淨戒無量威儀入一切如來海會壇受菩薩職位超過三界受佛教敕三摩地門具足因緣頓集功德廣大智慧於無上菩提皆不退轉離諸天魔一切煩惱及諸罪障念念消融證佛四種身謂自性身受用身變化身等流身滿足五智三十七等不共佛法然如來變化身於閻浮提摩竭陀國菩提場中成等正覺為地前菩薩聲聞緣覺凡夫説三乘教法或依他意趣説或自意趣説種種根器種種方便如法修行得人天果報或得三乘解脫果或進或退於無上菩提三無數大劫修行勤苦方得成佛王宮生雙林滅遺身舍利起塔供養感受人天勝妙果報及涅槃因不同報身毗盧遮那於色界頂第四禪阿迦尼吒天宮雲集盡虛空遍法界一切諸佛十地滿足諸大菩薩證明警覺身心頓證無上菩提自受用佛從心流出無量菩薩皆同一性謂金剛性對遍照如來受灌頂職位彼等菩薩各説三密門以獻毗盧遮那及一切如來便請加持教敕毗盧遮那佛言汝等將來於無量世界為最上乘者令得現生世出世間悉地成就彼諸菩薩受如來敕已頂禮佛足圍繞毗盧遮那佛已各還本方本位成為五輪本願幖幟若見若聞若入輪壇能斷有情五趣輪轉生死業障於五解脫輪中從一佛至一佛供養承事皆令獲得無上菩提成決定性猶如金剛不可沮壞此即毗盧遮那聖衆集會便為現證窣堵波塔一一菩薩一一金剛各住本三昧住自解脫皆住大悲願力廣利有情若見若聞悉證三昧功德智慧頓集成就矣
